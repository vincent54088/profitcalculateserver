spring:
  config:
    import: optional:classpath:excel-column-mapping.yml
  application:
    name: profit-calculate-server
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 105MB
  datasource:
    url: "jdbc:mysql://127.0.0.1:3306/agenteval?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
    username: "******"
    password: "******"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

app:
  upload-dir: ./uploads

logging:
  level:
    root: INFO
    com.huawei.tool: DEBUG

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.huawei.tool.dao.model
  configuration:
    map-underscore-to-camel-case: true
